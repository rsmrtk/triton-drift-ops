# Prometheus config for the single-VM demo stack (docker-compose.demo.yaml).
# Scrapes the two metric sources of the drift loop:
#   - gateway: model_drift_score / model_mean_confidence / ... (DriftMonitor)
#   - triton:  nv_inference_* (request counts, latency, GPU utilization)

global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:8081"]

  - job_name: triton
    static_configs:
      - targets: ["triton:8002"]
