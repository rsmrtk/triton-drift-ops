apiVersion: v1
kind: ServiceAccount
metadata:
  name: retrain-webhook
---
# Least-privilege: the webhook can only create/list Jobs in this
# namespace — nothing else in the cluster.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: retrain-webhook-job-manager
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: retrain-webhook-job-manager
subjects:
  - kind: ServiceAccount
    name: retrain-webhook
roleRef:
  kind: Role
  name: retrain-webhook-job-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retrain-webhook
  labels:
    app: retrain-webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: retrain-webhook
  template:
    metadata:
      labels:
        app: retrain-webhook
    spec:
      serviceAccountName: retrain-webhook
      containers:
        - name: retrain-webhook
          image: "{{ .Values.retrainWebhook.image.repository }}:{{ .Values.retrainWebhook.image.tag }}"
          ports:
            - containerPort: 8080
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: TRAIN_IMAGE
              value: {{ .Values.retrainWebhook.trainImage | quote }}
            - name: TRAIN_DEVICE
              value: {{ .Values.retrainWebhook.trainDevice | quote }}
            - name: TRAIN_EPOCHS
              value: {{ .Values.retrainWebhook.trainEpochs | quote }}
            - name: MLFLOW_TRACKING_URI
              value: {{ .Values.retrainWebhook.mlflowTrackingUri | quote }}
            - name: TRAIN_DATA_HOSTPATH
              value: {{ .Values.retrainWebhook.trainDataHostPath | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
          resources:
            {{- toYaml .Values.retrainWebhook.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: retrain-webhook
  labels:
    app: retrain-webhook
spec:
  selector:
    app: retrain-webhook
  ports:
    - port: 8080
