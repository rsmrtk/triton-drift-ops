# Least-privilege RBAC for the retrain webhook: it can only create, list,
# and get Jobs in its own namespace — nothing else in the cluster.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: retrain-webhook
  namespace: geo-mlops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: retrain-webhook-job-manager
  namespace: geo-mlops
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: retrain-webhook-job-manager
  namespace: geo-mlops
subjects:
  - kind: ServiceAccount
    name: retrain-webhook
    namespace: geo-mlops
roleRef:
  kind: Role
  name: retrain-webhook-job-manager
  apiGroup: rbac.authorization.k8s.io
