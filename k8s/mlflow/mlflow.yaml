# Minimal MLflow tracking server + model registry for the retrain loop.
# Demo-grade on purpose: sqlite backend + a small PVC — enough for the
# retrain Job (--log-mlflow) and the promotion gate (promote.py) to run
# against a real server. A production install would use Postgres +
# object storage; nothing in the client code changes.
# (PVC, not emptyDir: an evicted pod must not wipe the model registry —
# learned the hard way when a DiskPressure eviction erased the champion.)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-store
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  labels:
    app: mlflow
spec:
  replicas: 1
  # Recreate, not RollingUpdate: the store PVC is RWO, so the old pod
  # must release it before the new one can mount
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.16.0
          command: ["mlflow", "server"]
          args:
            - --host=0.0.0.0
            - --port=5000
            - --backend-store-uri=sqlite:////mlflow/mlflow.db
            - --artifacts-destination=/mlflow/artifacts
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: store
              mountPath: /mlflow
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: store
          persistentVolumeClaim:
            claimName: mlflow-store
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  labels:
    app: mlflow
spec:
  selector:
    app: mlflow
  ports:
    - port: 5000
