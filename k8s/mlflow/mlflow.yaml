# Minimal MLflow tracking server + model registry for the retrain loop.
# Demo-grade on purpose: sqlite backend + emptyDir artifacts — enough for
# the retrain Job (--log-mlflow) and the promotion gate (promote.py) to
# run against a real server. A production install would use Postgres +
# object storage; nothing in the client code changes.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.16.0
          command: ["mlflow", "server"]
          args:
            - --host=0.0.0.0
            - --port=5000
            - --backend-store-uri=sqlite:////mlflow/mlflow.db
            - --artifacts-destination=/mlflow/artifacts
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: store
              mountPath: /mlflow
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: store
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  labels:
    app: mlflow
spec:
  selector:
    app: mlflow
  ports:
    - port: 5000
