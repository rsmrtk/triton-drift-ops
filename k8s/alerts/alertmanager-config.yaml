# Routes drift alerts (action=retrain label) to the retrain-webhook
# service instead of a human channel. Merge this into the existing
# kube-prometheus-stack AlertManager config rather than replacing it
# wholesale — see comments below for the merge points.
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-drift-routing
  namespace: geo-mlops
stringData:
  alertmanager.yaml: |
    route:
      routes:
        - match:
            action: retrain
          receiver: retrain-webhook
          # dedupe repeated firings of the same alert while a retrain Job
          # is already running — the webhook itself is also idempotent
          # (see retrain-webhook/app.py), this just cuts noise
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 1h

    receivers:
      - name: retrain-webhook
        webhook_configs:
          - url: "http://retrain-webhook.geo-mlops.svc.cluster.local:8080/alert"
            send_resolved: false
