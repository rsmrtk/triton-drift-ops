name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # dependency-free sanity gate: every module must at least be valid
      # Python. Real training-loop validation happens in the container
      # stage, not here — the GH runner has no GPU and no GTSRB download.
      - name: syntax check
        run: |
          python -m py_compile $(git ls-files '*.py')

      - name: helm lint
        run: helm lint helm/triton-drift-ops && helm template t helm/triton-drift-ops > /dev/null

  build-images:
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: training
            dockerfile: training/Dockerfile
          - name: gateway
            dockerfile: serving/gateway/Dockerfile
          - name: retrain-webhook
            dockerfile: k8s/retrain-webhook/Dockerfile
            context: k8s/retrain-webhook
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/rsmrtk/triton-drift-ops-${{ matrix.name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context || '.' }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
